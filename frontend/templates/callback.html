<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating... - AIVA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: white;
            text-align: center;
        }
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #818cf8;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div>
        <div class="loader"></div>
        <h2>Securely Authenticating...</h2>
        <p style="color: #94a3b8;">Please wait while we log you into the AIVA platform.</p>
    </div>

    <!-- Integrate Supabase JS specifically for extracting the redirect Hash safely -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = "{{ config.get('SUPABASE_URL', os.environ.get('SUPABASE_URL')) }}";
        const supabaseKey = "{{ config.get('SUPABASE_KEY', os.environ.get('SUPABASE_KEY')) }}";
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        window.addEventListener("DOMContentLoaded", () => {
            // Listen for the OAuth redirect to be securely parsed by the Supabase client
            supabaseClient.auth.onAuthStateChange((event, session) => {
                if (event === 'SIGNED_IN' && session) {
                    // Fast track: Post the session securely to Flask backend HTTP cookie
                    fetch("{{ url_for('auth.set_session') }}", {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            access_token: session.access_token,
                            user_id: session.user.id,
                            user_name: session.user.user_metadata.full_name || 'User'
                        })
                    })
                    .then(res => res.json())
                    .then(result => {
                        if (result.success) {
                            window.location.href = result.redirect;
                        } else {
                            window.location.href = "{{ url_for('auth.login_page') }}?error=server";
                        }
                    })
                    .catch(err => {
                        console.error("Fetch Error:", err);
                        window.location.href = "{{ url_for('auth.login_page') }}?error=network";
                    });
                } else if (event === 'SIGNED_OUT') {
                    window.location.href = "{{ url_for('auth.login_page') }}";
                }
            });

            // Failsafe: if the URL lacks any auth hash, redirect them securely back after a delay
            setTimeout(async () => {
                const { data } = await supabaseClient.auth.getSession();
                if (!data || !data.session) {
                    window.location.href = "{{ url_for('auth.login_page') }}?error=no_session";
                }
            }, 3000);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIVA - DSA Code Practice</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; height: 100vh; display: flex; flexDirection: column; background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; }
        .top-nav { padding: 0 20px; height: 60px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .logo-box { background: rgba(56, 189, 248, 0.1); color: #38bdf8; padding: 8px 12px; border-radius: 8px; font-weight: bold; }
        .top-nav h3 { margin: 0; font-size: 1.1rem; font-weight: 600; color: #e2e8f0; }
        .nav-right { display: flex; align-items: center; gap: 15px; }
        select { padding: 8px 12px; background: #0f172a; color: #e2e8f0; border: 1px solid #334155; border-radius: 6px; outline: none; cursor: pointer; font-weight: 500; }
        button { font-family: 'Inter', sans-serif; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-run { background: rgba(255, 255, 255, 0.1); color: white; }
        .btn-run:hover:not(:disabled) { background: rgba(255,255,255,0.15); }
        .btn-submit { background: #22c55e; color: white; box-shadow: 0 4px 14px 0 rgba(34, 197, 94, 0.39); }
        .btn-submit:hover:not(:disabled) { background: #16a34a; }
        .spinner { display: inline-block; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .main-layout { display: flex; flex: 1; height: calc(100vh - 60px); }
        .left-panel { width: 40%; display: flex; flex-direction: column; border-right: 1px solid #334155; background: #0f172a; }
        .problem-desc { flex: 2; padding: 24px; overflow-y: auto; border-bottom: 1px solid #334155; }
        .problem-desc h2 { font-size: 1.5rem; margin-top: 0; margin-bottom: 16px; color: #f8fafc; }
        .problem-desc .content { color: #cbd5e1; line-height: 1.7; font-size: 0.95rem; }
        
        .custom-input { flex: 1; display: flex; flex-direction: column; background: #1e293b; }
        .panel-header { padding: 8px 16px; background: #0f172a; border-bottom: 1px solid #334155; font-size: 0.85rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; }
        textarea.input-box { flex: 1; width: 100%; background: transparent; border: none; color: #f8fafc; padding: 16px; outline: none; resize: none; font-family: monospace; box-sizing: border-box; }
        
        .right-panel { width: 60%; display: flex; flex-direction: column; }
        .editor-container { flex: 3; position: relative; }
        .terminal-output { flex: 1.5; background: #020617; border-top: 1px solid #334155; display: flex; flex-direction: column; }
        .terminal-content { color: #a3e635; padding: 16px; overflow-y: auto; font-family: monospace; font-size: 0.9rem; flex: 1; }
        pre { margin: 0; white-space: pre-wrap; word-wrap: break-word; }

        .test-case { margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .badge-passed { color: #22c55e; background: rgba(34, 197, 94, 0.1); padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; }
        .badge-failed { color: #ef4444; background: rgba(239, 68, 68, 0.1); padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; }
    </style>
    <!-- Load Monaco Editor via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
</head>
<body>
    <div class="top-nav">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="logo-box">&lt;/&gt;</div>
            <h3>AIVA Code Practice</h3>
        </div>
        <div class="nav-right">
            <select id="language-select">
                <option value="python">Python</option>
                <option value="cpp">C++</option>
                <option value="java">Java</option>
                <option value="javascript">JavaScript</option>
            </select>
            <button class="btn-run" id="btn-run">Run</button>
            <button class="btn-submit" id="btn-submit">Submit Code</button>
            <button class="btn-run" onclick="window.history.back()" style="background: transparent; border: 1px solid #334155;">&larr; Back</button>
        </div>
    </div>

    <div class="main-layout">
        <div class="left-panel">
            <div class="problem-desc" id="problem-desc-container">
                <div style="color: #64748b; display: flex; height: 100%; align-items: center; justify-content: center;">Loading Problem...</div>
            </div>
            <div class="custom-input">
                <div class="panel-header">Custom Input</div>
                <textarea id="custom-input-box" class="input-box" placeholder="Enter stdin variables here..."></textarea>
            </div>
        </div>
        <div class="right-panel">
            <div class="editor-container" id="monaco-editor"></div>
            <div class="terminal-output">
                <div class="panel-header">Terminal Output</div>
                <div class="terminal-content" id="output-box">
                    <pre>Run code to see output...</pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        let editor;
        let currentProblem = null;

        // Initialize Monaco Editor
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.40.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('monaco-editor'), {
                value: "// Write your solution here\n",
                language: 'python',
                theme: 'vs-dark',
                automaticLayout: true,
                minimap: { enabled: false },
                fontSize: 14,
                padding: { top: 16 }
            });
            
            document.getElementById('language-select').addEventListener('change', (e) => {
                monaco.editor.setModelLanguage(editor.getModel(), e.target.value);
            });
        });

        // Load Problem
        fetch('/ide/problem')
            .then(res => res.json())
            .then(data => {
                currentProblem = data;
                document.getElementById('problem-desc-container').innerHTML = `
                    <h2>${data.title}</h2>
                    <div class="content">${data.description}</div>
                `;
                if (data.test_cases && data.test_cases.length > 0) {
                    document.getElementById('custom-input-box').value = data.test_cases[0].input;
                }
            })
            .catch(err => {
                document.getElementById('problem-desc-container').innerHTML = `<div style="color:red">Failed to load problem.</div>`;
            });

        // Render Output Helper
        function renderOutput(text) {
            document.getElementById('output-box').innerHTML = `<pre>${text.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</pre>`;
        }

        // Run Code
        document.getElementById('btn-run').addEventListener('click', async () => {
            const btn = document.getElementById('btn-run');
            btn.disabled = true;
            btn.innerHTML = `<span class="spinner">↻</span> Running...`;
            renderOutput("Compiling and executing...");

            try {
                const response = await fetch('/ide/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        code: editor.getValue(),
                        language: document.getElementById('language-select').value,
                        input: document.getElementById('custom-input-box').value
                    })
                });
                const data = await response.json();
                
                if (data.output !== undefined && data.output !== null) {
                    renderOutput(data.output === "" ? "Program executed successfully with no output." : data.output);
                } else if (data.error) {
                    renderOutput(data.error);
                } else {
                    renderOutput("Program executed successfully. No output returned.");
                }
            } catch (err) {
                renderOutput("Execution server failed: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Run";
            }
        });

        // Submit Code
        document.getElementById('btn-submit').addEventListener('click', async () => {
            if (!currentProblem) return;
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerHTML = `<span class="spinner">↻</span> Testing...`;
            renderOutput("Running test cases...");

            try {
                const response = await fetch('/ide/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        code: editor.getValue(),
                        language: document.getElementById('language-select').value,
                        problem_id: currentProblem.id
                    })
                });
                const data = await response.json();
                
                let html = `<pre>Passed ${data.passed} / ${data.total} test cases</pre>`;
                if (data.results && data.results.length > 0) {
                    html += `<div style="margin-top: 20px; border-top: 1px dashed #334155; padding-top: 16px;">`;
                    data.results.forEach(test => {
                        const isPass = test.status === "Passed";
                        html += `
                            <div class="test-case">
                                <span style="color: #94a3b8;">Test Case ${test.testcase}</span>
                                <span class="${isPass ? 'badge-passed' : 'badge-failed'}">● ${test.status}</span>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
                document.getElementById('output-box').innerHTML = html;
            } catch (err) {
                renderOutput("Submit failed: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = "Submit Code";
            }
        });
    </script>
</body>
</html>
